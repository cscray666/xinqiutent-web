<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Industry Trends | Ningbo Xinqiu Tents</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-blue-900">XINQIU TENT</a>
            <a href="index.html" class="text-blue-600 font-bold"><i class="fas fa-arrow-left mr-2"></i> Back to Home</a>
        </div>
    </nav>

    <article class="max-w-4xl mx-auto px-4 py-20 bg-white shadow-sm mt-12 rounded-3xl min-h-screen">
        <div id="news-content">
            <h1 class="text-4xl md:text-5xl font-bold text-blue-900 mb-8 leading-tight text-center">Loading News...</h1>
        </div>
    </article>

    <footer class="bg-gray-900 text-white py-12 mt-24">
        <div class="max-w-7xl mx-auto px-4 text-center opacity-60 text-sm">
            &copy; 2026 Ningbo Xinqiu Travelling Products Co., Ltd.
        </div>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const newsId = params.get('id');
        const content = document.getElementById('news-content');

        const newsData = {
            '1': {
                title: "Factory Capacity Expansion for 2026 Peak Season",
                date: "April 11, 2026",
                image: "https://sc02.alicdn.com/kf/Afbc175afab4f44f7b117a78c837d9aadi.png",
                body: `
                    <p class="text-gray-600 mb-6 leading-relaxed text-lg">Ningbo Xinqiu Tents is proud to announce a significant expansion of its manufacturing capacity in preparation for the upcoming 2026 outdoor peak season. We have integrated 15 new high-precision automated sewing machines and expanded our assembly lines to optimize production efficiency by 25%.</p>
                    <img src="https://sc02.alicdn.com/kf/Afbc175afab4f44f7b117a78c837d9aadi.png" class="rounded-3xl shadow-lg mb-8 w-full h-[450px] object-cover">
                    <p class="text-gray-600 mb-6 leading-relaxed text-lg">This expansion allows us to reduce our average lead time for bulk orders while maintaining the rigorous quality standards that our global partners expect. Our R&D team is also testing 10 new prototype styles that will be available for OEM/ODM customization by next month.</p>
                `
            },
            '2': {
                title: "Global Market Reach Reaches 80+ Countries",
                date: "April 11, 2026",
                image: "https://sc02.alicdn.com/kf/Aaa200a8cb53246e498582fd13f96557bo.png",
                body: `
                    <p class="text-gray-600 mb-6 leading-relaxed text-lg">We are excited to share that Xinqiu Tents has successfully delivered high-quality outdoor shelters to over 80 countries and regions worldwide. Our latest shipments have reached key distributors in Northern Europe and the Australian outback.</p>
                    <img src="https://sc02.alicdn.com/kf/Aaa200a8cb53246e498582fd13f96557bo.png" class="rounded-3xl shadow-lg mb-8 w-full h-[450px] object-cover">
                    <p class="text-gray-600 mb-6 leading-relaxed text-lg">By participating in major international trade fairs and optimizing our cross-border logistics, we have become a trusted partner for outdoor brands looking for reliable factory-direct manufacturing. Our team is committed to providing localized support for our growing international clientele.</p>
                `
            },
            '3': {
                title: "New Eco-Friendly Fabric Material Implementation",
                date: "April 11, 2026",
                image: "https://sc02.alicdn.com/kf/A23e2477436064784859ae898359a80b6G.png",
                body: `
                    <p class="text-gray-600 mb-6 leading-relaxed text-lg">Sustainability is at the core of our 2026 development roadmap. Xinqiu Tents is now implementing recycled polyester fabrics (rPET) across our standard camping tent product lines.</p>
                    <img src="https://sc02.alicdn.com/kf/A23e2477436064784859ae898359a80b6G.png" class="rounded-3xl shadow-lg mb-8 w-full h-[450px] object-cover">
                    <p class="text-gray-600 mb-6 leading-relaxed text-lg">These eco-friendly materials offer the same durability and water resistance as traditional fabrics but with a significantly lower carbon footprint. This initiative helps our B2B partners meet their sustainability goals while providing consumers with high-performance, planet-friendly gear.</p>
                `
            },
            '4': {
                title: "2026 Camping Industry Insights: The Inflatable Glamping Era",
                date: "April 12, 2026",
                image: "https://sc02.alicdn.com/kf/Abefe6412a8b043cebfd928fd5fa5f60bP.png",
                body: `
                    <p class="text-gray-600 mb-6 leading-relaxed text-lg">The global camping tent market is projected to reach USD 10.9 billion by 2033, and the "Inflatable Glamping" trend is a major driver of this growth. In 2026, we are seeing a significant shift from traditional pole-based tents to luxury inflatable structures that offer faster setup and a more premium experience.</p>
                    <img src="https://sc02.alicdn.com/kf/Abefe6412a8b043cebfd928fd5fa5f60bP.png" class="rounded-3xl shadow-lg mb-8 w-full h-[450px] object-cover">
                    <p class="text-gray-600 mb-6 leading-relaxed text-lg">For B2B buyers and outdoor brands, this trend represents a unique opportunity to differentiate their product lines. Xinqiu Tents is at the forefront of this evolution, providing high-end 6-8 person cotton canvas inflatable glamping solutions that combine traditional comfort with modern engineering.</p>
                `
            }
        };

        if (newsData[newsId]) {
            const news = newsData[newsId];
            content.innerHTML = `
                <div class="text-blue-600 font-bold mb-4 text-center">${news.date}</div>
                <h1 class="text-4xl md:text-5xl font-bold text-blue-900 mb-12 leading-tight text-center">${news.title}</h1>
                <div class="prose prose-lg max-w-none text-gray-700">
                    ${news.body}
                </div>
            `;
        } else {
            content.innerHTML = `<h1 class="text-3xl font-bold text-center">News article not found.</h1><a href="index.html" class="text-blue-600 mt-8 block text-center font-bold">Return to Home</a>`;
        }
    </script>
</body>
</html>
